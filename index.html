<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Agenda de Contactos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.m
in.css" rel="stylesheet">
</head>

<body class="bg-light">
    <div class="container mt-5">
        <h1 class="text-center mb-4">📒 Agenda de Contactos</h1>
        <!-- FORMULARIO -->
        <div class="card mb-4 shadow">
            <div class="card-body">
                <h5 class="card-title">Contacto</h5>
                <div class="row g-3">
                    <div class="col-md-6">
                        <input type="text" id="nombre" class="form-control" placeholder="Nombre" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" id="telefono" class="form-control" placeholder="Teléfono" required>
                    </div>
                    <div class="col-md-6">
                        <input type="email" id="email" class="form-control" placeholder="Email" required>
                    </div>
                    <div class="col-md-6">
                        <input type="text" id="empresa" class="form-control" placeholder="Empresa" required>
                    </div>
                </div>

                0403ED_01_
                Gestión Agenda Contactos
                <div class="mt-3 d-flex gap-2 flex-wrap">
                    <button class="btn btn-primary" onclick="agregarContacto()">Añadir persona</button>
                    <button class="btn btn-success" onclick="buscarContacto()">Buscar persona</button>
                    
                </div>
            </div>
        </div>
        <!-- TABLA -->
        <div class="card shadow">
            <div class="card-body">
                <h5 class="card-title">Listado</h5>
                <table class="table table-striped table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Nombre</th>
                            <th>Teléfono</th>
                            <th>Email</th>
                            <th>Empresa</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="tablaContactos"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="./main.js"></script>
</body>

</html>
